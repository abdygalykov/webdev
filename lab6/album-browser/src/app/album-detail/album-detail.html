<div *ngIf="loading">Loading...</div>
<div *ngIf="album">
  <h1>Album #{{ album.id }}</h1>
  <p>User ID: {{ album.description }}</p>
  <input [(ngModel)]="album.title" />
  <button (click)="save()">Save</button>
  <br>
  <button (click)="router.navigate(['/albums', album.id, 'photos'])">View Photos</button>
  <button (click)="router.navigate(['/albums'])">Back</button>
</div>
